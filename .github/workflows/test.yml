name: Test

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf, x86_64-unknown-linux-gnu
          components: clippy

      - name: Run host-side tests
        run: cargo test-host

      - name: Check ESP32-C6 firmware compilation
        run: cargo check-esp

      - name: Run clippy (library only)
        run: cargo clippy --lib -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check
